name: ci

on:
  push:
    branches: [develop, main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/develop' && github.ref != 'refs/heads/main' }}

jobs:
  verify:
    name: verify (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24']
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Smoke test built CLI
        run: node dist/cli.js --help

      # TODO(follow-up): add macos-latest to matrix once src/lib/devices/ios.ts
      # warrants exercising the xcrun branch in CI.
      # TODO(follow-up): pnpm pack + extract + node ./dist/cli.js --help
      # to validate package files glob + bin shebang end-to-end.
      # TODO(follow-up): pnpm gen:method-map && git diff --exit-code src/data
      # to catch drift between pinned drivers and committed snapshots.
