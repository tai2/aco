name: e2e-ios

on:
  push:
    branches: [main]
  pull_request:
    # Opt-in: only run when e2e-relevant paths change, to save macOS minutes.
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'aut/**'
      - 'vitest.e2e.config.ts'
      - '.github/workflows/e2e-ios.yml'

permissions:
  contents: read

jobs:
  e2e-ios:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install aco deps + build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      # Appium + xcuitest driver (not a repo dep -- CLAUDE.md: user-installed).
      - name: Install Appium and xcuitest driver
        run: |
          npm i -g appium
          appium driver install xcuitest

      # Cache the compiled simulator .app keyed on everything that determines
      # it: the AUT source/config (prebuild + xcodebuild inputs) and the Xcode
      # toolchain that compiled the binary. On a hit we skip install + prebuild
      # + build entirely -- the e2e run only needs the .app, never aut/node_modules.
      - name: Resolve Xcode build for cache key
        id: xcode
        run: echo "build=$(xcodebuild -version | tail -1 | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      # The WDA cache is keyed on the appium-webdriveragent version, not the
      # xcuitest driver's: WDA is rebuilt cold whenever its Xcode project/source
      # changes, and that project ships inside the appium-webdriveragent package
      # (xcuitest only orchestrates the xcodebuild). Since we install Appium +
      # xcuitest unpinned (`npm i -g appium` / `appium driver install xcuitest`),
      # this version can drift between runs, so read it from the just-installed
      # package rather than hard-coding it.
      - name: Resolve WebDriverAgent version for cache key
        id: wda
        run: |
          WDA_PKG=$(find "${APPIUM_HOME:-$HOME/.appium}/node_modules" -path '*appium-webdriveragent/package.json' | head -1)
          echo "version=$(node -p "require('$WDA_PKG').version")" >> "$GITHUB_OUTPUT"

      # Restore only -- the matching save step runs right after the build below,
      # NOT in a post-job hook. Caches are branch-scoped: a run can read caches
      # from its own ref, its base branch, or the default branch (main) only --
      # never a sibling PR's. So PRs can only share this .app if a *main* run
      # seeds it. The combined actions/cache save is post-job, so when the flaky
      # boot/WDA/e2e steps fail the job, main never seeds the cache and every PR
      # rebuilds cold. Splitting restore/save lets us persist the .app the moment
      # the deterministic build succeeds, before the flaky steps can fail the job.
      - name: Restore built AUT (.app)
        id: aut-cache
        uses: actions/cache/restore@v4
        with:
          path: aut/ios/build/Build/Products/Release-iphonesimulator/acoAUT.app
          key: aut-ios-app-${{ runner.os }}-xcode${{ steps.xcode.outputs.build }}-${{ hashFiles('aut/app/**', 'aut/src/**', 'aut/assets/**', 'aut/app.json', 'aut/package.json', 'aut/pnpm-lock.yaml', 'aut/babel.config.js', 'aut/metro.config.js', 'aut/tsconfig.json') }}

      - name: Install AUT deps
        if: steps.aut-cache.outputs.cache-hit != 'true'
        run: pnpm aut:install

      - name: Prebuild + build the AUT (.app for simulator)
        if: steps.aut-cache.outputs.cache-hit != 'true'
        run: |
          pnpm aut:prebuild
          pnpm aut:build:ios

      # Persist the freshly built .app immediately -- before the boot/WDA/e2e
      # steps that flake -- so a green build seeds the cache even when the e2e
      # run later fails. On main this is what makes the cache readable by every
      # PR. cache-primary-key echoes the exact key the restore step computed.
      - name: Save built AUT (.app)
        if: steps.aut-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: aut/ios/build/Build/Products/Release-iphonesimulator/acoAUT.app
          key: ${{ steps.aut-cache.outputs.cache-primary-key }}

      - name: Boot a simulator
        run: |
          # Query the runner for the first available iPhone and capture its
          # UDID (to boot), name (to hand to aco) and iOS runtime version. Never
          # hard-code a device name -- the available runtimes differ per image.
          # The version matters: WDA is pre-built per runtime below, and the
          # session must reuse that exact build (a mismatch forces a cold
          # rebuild). Tab-separate: the name contains spaces ("iPhone 16 Pro"),
          # so a plain `read UDID NAME SDK` would mis-split it.
          IFS=$'\t' read -r UDID NAME SDK < <(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; k,dev=next((k,x) for k,v in d.items() if 'iOS' in k for x in v if 'iPhone' in x['name']); print(dev['udid'], dev['name'], k.rsplit('iOS-',1)[1].replace('-','.'), sep='\t')")
          xcrun simctl boot "$UDID" || true
          # Export the device we actually queried/booted, not a guessed label.
          # Pass the UDID too so aco pins the xcuitest session to this exact,
          # already-booted simulator instead of matching on name (which can hit
          # a different runtime's "iPhone 16 Pro" and cold-boot it -- slow and a
          # frequent cause of WDA-launch flake).
          echo "ACO_E2E_UDID=$UDID" >> "$GITHUB_ENV"
          echo "ACO_E2E_DEVICE_NAME=$NAME" >> "$GITHUB_ENV"
          echo "ACO_E2E_IOS_SDK=$SDK" >> "$GITHUB_ENV"

      # Restore the prebuilt WDA DerivedData (~170MB: the WebDriverAgentRunner
      # .app plus the .xctestrun that usePrebuiltWDA relaunches). The cold
      # xcodebuild below takes ~3 min; a hit skips it entirely. Keyed on the same
      # toolchain inputs as the .app cache plus the WDA source version and the
      # iOS SDK -- the .xctestrun is SDK-stamped (e.g. iphonesimulator26.5), so a
      # runtime bump must invalidate it. The directory is named
      # WebDriverAgent-<hash> where the hash derives from the package's absolute
      # path; the glob avoids hard-coding that hash, and usePrebuiltWDA=true
      # relaunches from this exact default-derivedDataPath location. Split
      # restore/save (like the .app) so a green pre-build seeds the cache even
      # when the flaky boot/WDA-launch/e2e steps later fail the job -- on main
      # that seed is what lets every PR read the cache.
      - name: Restore prebuilt WebDriverAgent
        id: wda-cache
        uses: actions/cache/restore@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/WebDriverAgent-*
          key: wda-ios-${{ runner.os }}-xcode${{ steps.xcode.outputs.build }}-wda${{ steps.wda.outputs.version }}-sdk${{ env.ACO_E2E_IOS_SDK }}

      # Compile WebDriverAgent once, up front. A from-scratch WDA xcodebuild on
      # a cold runner takes minutes -- longer than the driver's per-attempt
      # wdaLaunchTimeout -- so building it lazily inside the first session gets
      # killed mid-build and retried until the session-create deadline, failing
      # with `ECONNREFUSED 127.0.0.1:8100`. Pre-building warms DerivedData so the
      # first real session only has to launch the already-compiled WDA. Pin the
      # exact device name + SDK so the build matches the runtime the session uses.
      - name: Pre-build WebDriverAgent
        if: steps.wda-cache.outputs.cache-hit != 'true'
        run: appium driver run xcuitest build-wda --name "$ACO_E2E_DEVICE_NAME" --sdk "$ACO_E2E_IOS_SDK"

      # Persist the freshly built DerivedData immediately -- before the flaky
      # boot/WDA-launch/e2e steps -- so a green build seeds the cache regardless
      # of how the run ends. cache-primary-key echoes the exact key restore used.
      - name: Save prebuilt WebDriverAgent
        if: steps.wda-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData/WebDriverAgent-*
          key: ${{ steps.wda-cache.outputs.cache-primary-key }}

      - name: Run iOS e2e suite
        env:
          ACO_E2E_PLATFORM: ios
          ACO_AUT_IOS_APP: aut/ios/build/Build/Products/Release-iphonesimulator/acoAUT.app
          # WDA was compiled in the pre-build step above; tell the e2e session
          # to launch that prebuilt WDA instead of rebuilding it inside the
          # session-create deadline.
          ACO_E2E_PREBUILT_WDA: '1'
        run: pnpm run test:e2e

      # Appium writes its server log (incl. WDA boot timing and the :8100
      # ECONNREFUSED polling) to ~/.aco/logs; surface it on failure so a stuck
      # WDA launch is diagnosable without re-running.
      - name: Upload Appium logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aco-appium-logs
          path: ~/.aco/logs/
          if-no-files-found: ignore
