# Configures GitHub's auto-generated release notes (used by
# `gh release create --generate-notes`). Each merged PR becomes one
# bullet titled by its PR title, grouped by label.
changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Documentation
      labels:
        - documentation
    - title: Maintenance
      labels:
        - chore
        - ci
        - refactor
    - title: Other Changes
      labels:
        - '*'
